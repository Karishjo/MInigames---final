<div class="container mt-5">

  <div class="card shadow p-4">

    <h1 class="text-center mb-3">
      Mini Games
    </h1>

    <h5 class="text-center mb-4">
      Welcome {{ playerName }}
    </h5>

    <div class="d-grid gap-3">

      <button class="btn btn-games"
              (click)="goToFormula()">
        Formula Game
      </button>

      <button class="btn btn-games"
              (click)="goToHangman()">
        Hangman
      </button>

      <button class="btn btn-games"
              (click)="goHome()">
        Back to Home
      </button>


      <button class="btn btn-games"
              (click)="signOut()">
        Sign Out
      </button>


    </div>

  </div>

</div>
